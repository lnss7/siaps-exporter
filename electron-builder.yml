# SIAPS Exporter — build pro Windows (NSIS installer).
#
# Como buildar:
#   npm run dist           # gera o instalador em ./release/
#
# Pré-requisitos:
#   - Buildar NUMA máquina Windows (ideal), OU
#   - No macOS/Linux com Wine instalado: `brew install --cask wine-stable`
#     (cross-compile funciona mas é mais lento e pode ter quirks)

appId: br.gov.saude.siapsExporter
productName: SIAPS Exporter
copyright: Copyright © 2026 Gestora de Saúde

directories:
  output: release
  buildResources: build

# Arquivos que vão pra dentro do app.asar.
# `out/**` é o resultado do electron-vite build (main + preload + renderer).
# `config/**` precisa estar lá pra os JSONs serem lidos em runtime.
# `package.json` é necessário pro Electron resolver o `main` entry.
files:
  - out/**
  - config/**
  - package.json

# Por padrão tudo vai pra asar. `config/` fica DENTRO do asar — funciona porque
# o Electron intercepta fs.readFileSync pra ler de dentro do asar transparente.

asar: true

# ---- Configuração Windows ----
win:
  target:
    - target: nsis
      arch:
        - x64
  # Sem ícone custom: usa o padrão do Electron. Se quiser logo,
  # adicione build/icon.ico (256x256 mínimo) e descomente:
  # icon: build/icon.ico

# Instalador NSIS — UI tradicional de Windows "Next > Next > Install".
nsis:
  oneClick: false                 # Mostra wizard em vez de instalar silencioso
  perMachine: false               # Instala só pro usuário atual (não pede admin)
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SIAPS Exporter
  # uninstallDisplayName: "SIAPS Exporter"
  # license: build/license.txt    # opcional

# Não buildamos pra macOS/Linux por padrão — a gestora é Windows.
# Se quiser testar local no Mac sem Wine, rode: `npx electron-builder --mac`.

# ---- Auto-update via GitHub Releases ----
#
# Como funciona:
#   1. `npm run dist:publish` builda e sobe binários + arquivo `latest.yml` pro GitHub.
#   2. Toda vez que o app abre na máquina da Lizandra, ele consulta o `latest.yml`.
#   3. Se a versão remota for maior que a local, baixa em background.
#   4. Quando ela fechar e abrir o app de novo, a atualização é aplicada.
#
# Pré-requisito pra rodar `dist:publish`:
#   - Gerar Personal Access Token no GitHub com escopo `repo`
#   - Exportar como variável de ambiente: `export GH_TOKEN=ghp_xxxxx` (Mac/Linux)
#     ou `set GH_TOKEN=ghp_xxxxx` (Windows cmd) ou `$env:GH_TOKEN="ghp_xxxxx"` (PowerShell)
publish:
  provider: github
  owner: lnss7
  repo: siaps-exporter
  # ⚠️ Token de leitura embeddado pra o app conseguir baixar updates do repo
  # privado. Use um fine-grained PAT com `Contents: Read only` no repo.
  # Quando subir uma release (npm run dist:publish), o electron-builder usa
  # o GH_TOKEN do env (que precisa de Read+Write).
  # Pra fazer aqui ser um token só de leitura diferente do build-token,
  # descomente a linha abaixo e cole o token READ-ONLY:
  # token: github_pat_SEU_TOKEN_READONLY_AQUI
