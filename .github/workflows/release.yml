name: Build and Release

  on:
    push:
      tags:
        - 'v*.*.*'
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    release:
      runs-on: windows-latest
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'

        - name: Install dependencies
          run: npm install

        - name: Inject Google credential
          run: echo '${{ secrets.GOOGLE_CREDENTIAL_JSON }}' > config/google-credential.json
          shell: bash

        - name: Build and publish release
          run: npm run dist:publish
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
